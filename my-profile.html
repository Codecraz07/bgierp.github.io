<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | BGI ERP</title>
  <link rel="stylesheet" href="profile-student.css">
</head>
<body>

  <div class="edit-container">
    <header class="header">
      <img src="Picsart_25-09-30_21-14-45-613.png" alt="BGI Logo" class="logo">
      <h1>BGI ERP</h1>
    </header>

    <div class="title-bar">
      <h2>Edit Profile (प्रोफाइल संपादित करें)</h2>
    </div>

    <form class="profile-form">
      <div class="form-grid">

        <div class="form-group">
          <label>Name (नाम):</label>
          <input type="text" placeholder="Enter your name" value="*****">
        </div>

        <div class="form-group">
          <label>Name in Hindi (हिंदी में नाम):</label>
          <input type="text" placeholder="हिंदी में नाम दर्ज करें" value="******">
        </div>

        <div class="form-group">
          <label>Father's Name (पिता का नाम):</label>
          <input type="text" placeholder="Enter father's name" value="********">
        </div>

        <div class="form-group">
          <label>Mother's Name (माता का नाम):</label>
          <input type="text" placeholder="Enter mother's name" value="******">
        </div>

        <div class="form-group">
          <label>Gender (लिंग):</label>
          <select>
            <option selected>M</option>
            <option>F</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date of Birth (जन्म तिथि):</label>
          <input type="date" value="2006-03-03">
        </div>

        <div class="form-group">
          <label>Mobile No. (मोबाइल नंबर):</label>
          <input type="text" value="*7070108**">
        </div>

        <div class="form-group">
          <label>Email ID:</label>
          <input type="email" value="dileepsharma8707010@gmail.com">
        </div>

        <div class="form-group">
          <label>Address (पता):</label>
          <input type="text" value="***ribari Mathia, Deoria, Uttar Pradesh">
        </div>

        <div class="form-group">
          <label>Pincode (पिन कोड):</label>
          <input type="text" value="274701">
        </div>

        <div class="form-group">
          <label>Course (कोर्स):</label>
          <input type="text" value="B.Tech">
        </div>

        <div class="form-group">
          <label>Branch (शाखा):</label>
          <input type="text" value="Computer Science and Engineering">
        </div>

        <div class="form-group">
          <label>Semester (छमाही)</label>
          <input type="text" value="3rd">
        </div>

      </div>

      <!-- Upload Photo -->
      <div class="upload-section">
        <h3>Upload Photograph (फोटोग्राफ अपलोड करें)</h3>
        <input type="file" accept="image/*">
        <img src="profile-photo.jpg" alt="Profile Preview" class="preview-img">
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button type="submit" class="btn save-btn">💾 Save Changes</button>
        <button type="reset" class="btn cancel-btn">✖ Cancel</button>
      </div>

    </form>
  </div>

</body>
</html>
